apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-inference
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-inference
  template:
    metadata:
      labels:
        app: gpu-inference
    spec:
      nodeSelector:
        workload: gpu
      tolerations:
        - key: "gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: server
          image: nvidia/cuda:12.2.0-base-ubuntu22.04
          command: ["sleep", "3600"]
          resources:
            limits:
              nvidia.com/gpu: 1
