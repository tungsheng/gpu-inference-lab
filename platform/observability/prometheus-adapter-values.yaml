prometheus:
  url: http://kube-prometheus-stack-prometheus.monitoring.svc
  port: 9090
  path: ""

metricsRelistInterval: 30s
metricsMaxAge: 2m

rules:
  default: false
  custom:
    - seriesQuery: 'vllm:num_requests_running{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: '^vllm:num_requests_running$'
        as: 'vllm_requests_running'
      metricsQuery: 'max(max_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])) by (<<.GroupBy>>)'
