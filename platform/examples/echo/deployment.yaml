apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: app
  labels:
    app.kubernetes.io/part-of: gpu-inference-lab-example
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0
          args:
            - "-text=hello gpu inference lab"
          ports:
            - containerPort: 5678
