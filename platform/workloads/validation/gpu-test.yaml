apiVersion: v1
kind: Pod
metadata:
  name: gpu-test
  namespace: app
spec:
  restartPolicy: Never
  nodeSelector:
    workload: gpu
  tolerations:
    - key: "gpu"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  containers:
    - name: cuda
      image: nvidia/cuda:12.2.0-base-ubuntu22.04
      command: ["nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: 1
