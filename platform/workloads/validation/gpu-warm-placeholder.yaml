apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-warm-placeholder
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-warm-placeholder
  template:
    metadata:
      labels:
        app: gpu-warm-placeholder
        capacity-profile: warm-1
    spec:
      terminationGracePeriodSeconds: 0
      nodeSelector:
        workload: gpu
        serving: vllm
        karpenter.sh/capacity-type: on-demand
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: keeper
          image: public.ecr.aws/docker/library/busybox:1.36.1
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: "10m"
              memory: 32Mi
            limits:
              cpu: "50m"
              memory: 64Mi
