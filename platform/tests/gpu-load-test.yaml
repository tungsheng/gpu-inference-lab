apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-load-test
  namespace: app
data:
  load-test.js: |
    import http from "k6/http";
    import { check } from "k6";

    export const options = {
      scenarios: {
        inference_burst: {
          // Drive a fixed arrival rate so k6 does not self-throttle as latency rises.
          // That makes running-request-based HPA scale-out much more deterministic.
          executor: "ramping-arrival-rate",
          startRate: 1,
          timeUnit: "1s",
          preAllocatedVUs: 96,
          maxVUs: 256,
          stages: [
            { duration: "2m", target: 6 },
            { duration: "8m", target: 6 },
            { duration: "2m", target: 0 },
          ],
        },
      },
      thresholds: {
        http_req_failed: ["rate<0.05"],
      },
    };

    const targetUrl = __ENV.TARGET_URL || "http://vllm-openai.app.svc.cluster.local/v1/completions";
    const payload = JSON.stringify({
      model: "qwen2.5-0.5b",
      prompt: "Write a detailed 12-point explanation of why elastic GPU nodes help an inference platform, with each point expanded into multiple full sentences.",
      max_tokens: 1024,
      temperature: 0,
    });

    export default function () {
      const response = http.post(targetUrl, payload, {
        headers: {
          "Content-Type": "application/json",
        },
        timeout: "180s",
      });

      check(response, {
        "completion request succeeded": (res) => res.status === 200,
      });
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-load-test
  namespace: app
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.49.0
          args:
            - run
            - /scripts/load-test.js
          env:
            - name: TARGET_URL
              value: http://vllm-openai.app.svc.cluster.local/v1/completions
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: gpu-load-test
