apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-serving
spec:
  template:
    metadata:
      labels:
        workload: gpu
        serving: vllm
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu-serving

      taints:
        - key: gpu
          value: "true"
          effect: NoSchedule

      requirements:
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - g4dn
            - g5
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values:
            - xlarge
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: kubernetes.io/os
          operator: In
          values:
            - linux

  limits:
    cpu: "16"
    memory: 64Gi

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 2m
