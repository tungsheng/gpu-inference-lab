apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # Pin the AL2023 alias so test runs stay repeatable instead of drifting with `latest`.
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@v20260304

  role: gpu-inference-karpenter-node

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: gpu-inference

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: gpu-inference
