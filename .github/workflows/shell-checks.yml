name: Shell Checks

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Terraform init
        run: terraform -chdir=infra/env/dev init -backend=false -input=false

      - name: Terraform validate
        run: terraform -chdir=infra/env/dev validate

      - name: Bash syntax
        run: |
          chmod +x scripts/up scripts/verify scripts/down scripts/evaluate scripts/experiment test/*.sh
          bash -n scripts/_common.sh scripts/lib/*.sh scripts/up scripts/verify scripts/down scripts/evaluate scripts/experiment test/*.sh test/helpers/*.sh

      - name: Shellcheck
        run: |
          shellcheck scripts/_common.sh scripts/lib/*.sh scripts/up scripts/verify scripts/down scripts/evaluate scripts/experiment test/*.sh test/helpers/*.sh

      - name: Experiment catalog validation
        run: ./scripts/experiment validate

      - name: Shell tests
        run: ./test/run.sh
