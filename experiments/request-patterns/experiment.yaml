# Controlled traffic-shape experiment for GPU utilization analysis.

name: request-patterns
title: Request Pattern Utilization
status: scaffolded
owner: local

question: How do steady, burst, uneven-size, and spike-to-zero request patterns change GPU utilization and queue behavior?

serving_profile:
  model: Qwen/Qwen2.5-0.5B-Instruct
  served_model_name: qwen2.5-0.5b
  vllm_image: vllm/vllm-openai:v0.9.0
  max_model_len: 2048
  gpu_memory_utilization: 0.85
  notes:
    - Use the same serving profile across all traffic patterns before changing scheduler or autoscaling settings.

workload:
  generator: k6
  endpoint: /v1/completions
  cases_file: cases.csv
  request_shapes_file: request-shapes.csv
  serving_profiles_file: serving-profiles.csv
  prompt_strategy: approximate-token-target

metrics:
  latency:
    - p50_request_latency_seconds
    - p95_request_latency_seconds
    - p99_request_latency_seconds
  serving:
    - requests_per_second
    - generation_tokens_per_second
    - peak_waiting_requests
    - peak_running_requests
    - peak_active_requests
  gpu:
    - average_gpu_utilization_percent
    - max_gpu_utilization_percent
    - gpu_memory_used_bytes
    - gpu_memory_free_bytes
  cost:
    - cost_per_1000_successful_requests
    - cost_per_1m_generated_tokens

artifacts:
  readme: README.md
  results: results.md
  graphs_dir: graphs
