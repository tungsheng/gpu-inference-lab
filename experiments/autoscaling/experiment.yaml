# Controlled autoscaling experiment for burst queueing behavior.

name: autoscaling
title: Autoscaling And Queueing Behavior
status: scaffolded
owner: local

question: How much burst traffic is lost or delayed while Karpenter and vLLM capacity are still coming online?

serving_profile:
  defaults: ../_profiles/serving-defaults.csv
  profiles_file: serving-profiles.csv
  notes:
    - Run direct and queued cases with the same serving profile before changing HPA or Karpenter settings.

workload:
  generator: k6
  endpoint: /v1/completions
  cases_file: cases.csv
  client_policies_file: client-policies.csv
  prompt_strategy: approximate-token-target

metrics:
  latency:
    - p50_request_latency_seconds
    - p95_request_latency_seconds
    - p99_request_latency_seconds
  serving:
    - requests_per_second
    - generation_tokens_per_second
    - peak_waiting_requests
    - peak_running_requests
    - peak_active_requests
    - dropped_iterations
    - buffering_required_requests
    - failure_attribution
  scaling:
    - first_nodeclaim_seconds
    - first_gpu_node_seconds
    - pod_scheduled_seconds
    - container_started_seconds
    - model_ready_seconds
    - first_successful_completion_seconds
  gpu:
    - average_gpu_utilization_percent
    - max_gpu_utilization_percent
    - gpu_memory_used_bytes
    - gpu_memory_free_bytes

artifacts:
  readme: README.md
  results: results.md
  graphs_dir: graphs
