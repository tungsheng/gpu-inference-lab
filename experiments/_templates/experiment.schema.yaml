# Template for experiment metadata.
#
# Keep experiment-specific workload cases in a sibling cases.csv file so shell
# tooling can render jobs without adding a YAML parser dependency.

name: example-experiment
title: Example Experiment
status: planned
owner: local

question: What systems tradeoff does this experiment make visible?

serving_profile:
  defaults: ../_profiles/serving-defaults.csv
  profiles_file: serving-profiles.csv
  notes:
    - Put only experiment-specific serving overrides in serving-profiles.csv.

workload:
  generator: k6
  endpoint: /v1/completions
  cases_file: cases.csv
  request_shapes_file: request-shapes.csv
  client_policies_file: client-policies.csv
  cost_profiles_file: cost-profiles.csv
  prompt_strategy: approximate-token-target

metrics:
  latency:
    - p50_request_latency_seconds
    - p95_request_latency_seconds
    - p99_request_latency_seconds
  serving:
    - p95_ttft_seconds
    - requests_per_second
    - generation_tokens_per_second
    - peak_waiting_requests
    - peak_running_requests
    - peak_active_requests
  gpu:
    - average_gpu_utilization_percent
    - max_gpu_utilization_percent
    - gpu_memory_used_bytes
    - gpu_memory_free_bytes
  cost:
    - estimated_burst_cost
    - cost_per_1000_successful_requests
    - cost_per_1m_generated_tokens
  slo:
    - slo_passed

artifacts:
  readme: README.md
  results: results.md
  graphs_dir: graphs
