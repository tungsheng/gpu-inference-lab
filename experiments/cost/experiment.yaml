# Controlled experiment for cost per useful request and generated token.

name: cost
title: Cost Per Useful Work
status: scaffolded
owner: local

question: How much cheaper does the same GPU become when useful work is increased through concurrency and batching?

serving_profile:
  model: Qwen/Qwen2.5-0.5B-Instruct
  served_model_name: qwen2.5-0.5b
  vllm_image: vllm/vllm-openai:v0.9.0
  max_model_len: 2048
  gpu_memory_utilization: 0.85
  notes:
    - The hourly cost model covers serving GPU capacity only.
    - Failed requests are excluded from useful-request cost denominators.

workload:
  generator: k6
  endpoint: /v1/completions
  cases_file: cases.csv
  serving_profiles_file: serving-profiles.csv
  cost_profiles_file: cost-profiles.csv
  prompt_strategy: approximate-token-target

metrics:
  latency:
    - p50_request_latency_seconds
    - p95_request_latency_seconds
    - p99_request_latency_seconds
  serving:
    - completed_requests
    - successful_requests
    - generated_tokens
    - requests_per_second
    - generation_tokens_per_second
  gpu:
    - average_gpu_utilization_percent
    - max_gpu_utilization_percent
  cost:
    - estimated_burst_cost
    - cost_per_1000_successful_requests
    - cost_per_1m_generated_tokens
  slo:
    - slo_passed

artifacts:
  readme: README.md
  results: results.md
  graphs_dir: graphs
